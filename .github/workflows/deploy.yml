name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Opt the JavaScript-based actions into Node.js 24 so the deprecation
    # warnings about Node.js 20 end of life (Sep 2026) go away, and the
    # actions keep working after GitHub forces the default in June 2026.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & Build
        env:
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}
        run: |
          npm ci
          npm run build

      # Inject SMTP credentials into the built output so the PHP form
      # handler (send.php) can email leads through Google Workspace.
      # Secrets never live in the repo; they are written here at deploy
      # time and re-created on every push (the FTP step is clean-slate).
      - name: Write mail credentials
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          cat > dist/mail_secrets.php <<PHP
          <?php
          return [
              'host' => 'smtp.gmail.com',
              'port' => 587,
              'user' => '${SMTP_USER}',
              'pass' => '${SMTP_PASS}',
              'to'   => '${MAIL_TO:-info@performancemaxagency.com}',
          ];
          PHP
          echo "mail_secrets.php written ($(wc -c < dist/mail_secrets.php) bytes)"

      # Hostinger FTP occasionally times out on the control socket.
      # Three attempts with the same action; the final attempt is the one
      # that decides job outcome. Prevents transient blips from leaving
      # permanent red marks on CI.
      - name: Deploy via FTP (attempt 1)
        id: deploy1
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        continue-on-error: true
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./dist/
          server-dir: /public_html/
          dangerous-clean-slate: true

      - name: Deploy via FTP (attempt 2)
        if: steps.deploy1.outcome == 'failure'
        id: deploy2
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        continue-on-error: true
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./dist/
          server-dir: /public_html/
          dangerous-clean-slate: true

      - name: Deploy via FTP (attempt 3, final)
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./dist/
          server-dir: /public_html/
          dangerous-clean-slate: true
